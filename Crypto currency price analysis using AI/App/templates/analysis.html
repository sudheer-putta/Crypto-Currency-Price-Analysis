<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crypto currency price analysis using GNN</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        /* General Styles */
        body {
            background-color: #eae7dc;
            font-family: 'Arial', sans-serif;
        }

        /* Navbar */
        .navbar {
            background-color: #2d2d2d;
            padding: 12px 20px;
        }
        .navbar-brand {
            font-size: 22px;
            font-weight: bold;
            color: #d4cbb8 !important;
        }
        .navbar-nav .nav-link {
            color: #b5b0a1 !important;
            font-size: 16px;
            margin-right: 15px;
            transition: 0.3s;
        }
        .navbar-nav .nav-link:hover {
            color: #f5f3ed !important;
        }
        .navbar-toggler {
            border: none;
            outline: none;
        }
        .navbar-toggler-icon {
            filter: brightness(80%);
        }

        /* Main Content */
        .container {
            max-width: 900px;
            margin-top: 50px;
            padding: 30px;
            background: #ffffff;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
        }

        h2 {
            color: #555;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .image-container {
            text-align: center;
            margin-bottom: 20px;
        }

        img {
            width: 100%;
            max-width: 800px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
        }

    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Crypto currency price analysis using GNN</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/home">Predict</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/analysis">Analysis</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Analysis Page -->
    <div class="container">
        <h2>Crypto-Bitcoin Data Analysis</h2>

        {% for plot in plot_paths %}
        <div class="image-container">
            <img src="{{ plot }}" alt="Analysis Graph">
        </div>
        {% endfor %}
    </div>

</body>
</html>
